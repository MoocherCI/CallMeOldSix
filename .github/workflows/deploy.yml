name: 'Deploy User Platform'

on:
  push:
    tags:
      - 'dev-v**'
      - 'test-v**'
      - 'prod-v**'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      version:
        description: '版本号（留空=自动生成时间戳，如 20260312153000）'
        required: false
        type: string
        default: ''
      services:
        description: '部署服务（all=全部）'
        required: false
        type: choice
        options:
          - all
          - app
          - agent
          - admin
          - app+agent
          - app+admin
          - agent+admin
        default: 'all'
      branch:
        description: '私有仓库分支（留空=默认分支）'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: moocherci/user-platform
  AGENT_IMAGE_NAME: moocherci/agent
  ADMIN_IMAGE_NAME: moocherci/admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      services_display: ${{ env.SERVICES_DISPLAY }}
      deploy_status: ${{ job.status }}
      repo_branch: ${{ env.REPO_BRANCH }}
      commit_sha: ${{ env.COMMIT_SHA }}
      commit_message: ${{ env.COMMIT_MESSAGE }}
      commit_time: ${{ env.COMMIT_TIME }}
      deploy_tag: ${{ env.DEPLOY_TAG }}
    permissions:
      contents: read
      packages: write
    steps:
      # Step 1: Checkout proxy repo (for scripts) and configure SSH
      - name: Checkout proxy repo
        uses: actions/checkout@v4

      - name: Configure git for private repo access
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/gitconfig.sh
        env:
          ED25519_KEY: ${{ secrets.ED25519_KEY }}

      # Step 2: Parse tag for environment, branch, and services
      - name: Parse tag for environment, branch, and services
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # --- Manual trigger: read from inputs ---
            DEPLOY_ENV="${{ inputs.environment }}"
            VERSION="${{ inputs.version }}"
            REPO_BRANCH="${{ inputs.branch }}"
            SERVICES_INPUT="${{ inputs.services }}"

            # Auto-generate version if empty
            if [ -z "$VERSION" ]; then
              VERSION=$(date -u +'%Y%m%d%H%M%S')
            fi

            # Set DEPLOY_HOST based on environment
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV

            # Parse services
            BUILD_APP="false"
            BUILD_AGENT="false"
            BUILD_ADMIN="false"
            DISPLAY_PARTS=()

            if [ "$SERVICES_INPUT" = "all" ] || [ -z "$SERVICES_INPUT" ]; then
              BUILD_APP="true"
              BUILD_AGENT="true"
              BUILD_ADMIN="true"
              SERVICES_DISPLAY="app, agent, admin"
            else
              IFS='+' read -ra SVC_ARRAY <<< "$SERVICES_INPUT"
              for svc in "${SVC_ARRAY[@]}"; do
                case "$svc" in
                  app)   BUILD_APP="true";   DISPLAY_PARTS+=("app") ;;
                  agent) BUILD_AGENT="true"; DISPLAY_PARTS+=("agent") ;;
                  admin) BUILD_ADMIN="true"; DISPLAY_PARTS+=("admin") ;;
                esac
              done
              SERVICES_DISPLAY=$(IFS=', '; echo "${DISPLAY_PARTS[*]}")
            fi

            # Construct a synthetic tag name for display
            DEPLOY_TAG="${DEPLOY_ENV}-v${VERSION}"
            IMAGE_TAG="${DEPLOY_ENV}-v${VERSION}"
          else
            # --- Tag trigger: parse from github.ref_name (existing logic) ---
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == dev-v* ]]; then
              DEPLOY_ENV="dev"
              REMAINDER="${TAG#dev-v}"
            elif [[ "$TAG" == test-v* ]]; then
              DEPLOY_ENV="test"
              REMAINDER="${TAG#test-v}"
            elif [[ "$TAG" == prod-v* ]]; then
              DEPLOY_ENV="prod"
              REMAINDER="${TAG#prod-v}"
            fi

            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV

            BUILD_APP="false"
            BUILD_AGENT="false"
            BUILD_ADMIN="false"
            REPO_BRANCH=""

            if [[ "$REMAINDER" == *+* ]]; then
              VERSION_PART="${REMAINDER%%+*}"
              SERVICES_AND_BRANCH="${REMAINDER#*+}"

              if [[ "$SERVICES_AND_BRANCH" == *-* ]]; then
                SERVICES_PART="${SERVICES_AND_BRANCH%%-*}"
                REPO_BRANCH="${SERVICES_AND_BRANCH#*-}"
              else
                SERVICES_PART="$SERVICES_AND_BRANCH"
              fi

              IFS='.' read -ra SVC_ARRAY <<< "$SERVICES_PART"
              DISPLAY_PARTS=()
              for svc in "${SVC_ARRAY[@]}"; do
                case "$svc" in
                  app)   BUILD_APP="true";   DISPLAY_PARTS+=("app") ;;
                  agent) BUILD_AGENT="true"; DISPLAY_PARTS+=("agent") ;;
                  admin) BUILD_ADMIN="true"; DISPLAY_PARTS+=("admin") ;;
                esac
              done
              SERVICES_DISPLAY=$(IFS=', '; echo "${DISPLAY_PARTS[*]}")
            else
              BUILD_APP="true"
              BUILD_AGENT="true"
              BUILD_ADMIN="true"
              SERVICES_DISPLAY="app, agent, admin"

              if [[ "$REMAINDER" == *-* ]]; then
                REPO_BRANCH="${REMAINDER#*-}"
              fi
            fi

            DEPLOY_TAG="$TAG"
            # IMAGE_TAG: strip +services portion from tag for Docker compatibility
            IMAGE_TAG=$(echo "$TAG" | sed 's/+[^-]*//' | sed 's/[^a-zA-Z0-9._-]/-/g')
          fi

          echo "DEPLOY_ENV=${DEPLOY_ENV}" >> $GITHUB_ENV
          echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV
          echo "BUILD_APP=${BUILD_APP}" >> $GITHUB_ENV
          echo "BUILD_AGENT=${BUILD_AGENT}" >> $GITHUB_ENV
          echo "BUILD_ADMIN=${BUILD_ADMIN}" >> $GITHUB_ENV
          echo "SERVICES_DISPLAY=${SERVICES_DISPLAY}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "DEPLOY_TAG=${DEPLOY_TAG}" >> $GITHUB_ENV

      # Step 3: Checkout private repository
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.REPOSITORY }}
          ssh-key: ${{ secrets.ED25519_KEY }}
          ref: ${{ env.REPO_BRANCH }}

      - name: Extract commit info from private repo
        run: |
          echo "COMMIT_SHA=$(git log -1 --pretty=format:'%H')" >> $GITHUB_ENV
          echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git log -1 --pretty=format:'%cI')" >> $GITHUB_ENV

      # Step 4: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # Step 5.5: Generate Prisma schemas from shared models
      - name: Generate Prisma schemas
        if: env.BUILD_APP == 'true' || env.BUILD_ADMIN == 'true'
        run: |
          chmod +x prisma-shared/build-schema.sh
          if [ "${{ env.BUILD_APP }}" = "true" ]; then
            bash prisma-shared/build-schema.sh user-platform/prisma/base.prisma user-platform/prisma/schema.prisma
          fi
          if [ "${{ env.BUILD_ADMIN }}" = "true" ]; then
            bash prisma-shared/build-schema.sh admin-platform/api/prisma/base.prisma admin-platform/api/prisma/schema.prisma
          fi

      # Step 6: Build and push Docker image
      - name: Build and push Docker image
        if: env.BUILD_APP == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./user-platform
          file: ./user-platform/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6.5: Build and push Agent Docker image
      - name: Build and push Agent Docker image
        if: env.BUILD_AGENT == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6.6: Build and push Admin Docker image
      - name: Build and push Admin Docker image
        if: env.BUILD_ADMIN == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./admin-platform
          file: ./admin-platform/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 7: Upload files to server
      - name: Copy global files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "user-platform/docker-compose.yml"
          target: "~/cuneim/"
          strip_components: 1

      - name: Copy app prisma files to server
        if: env.BUILD_APP == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "user-platform/prisma/"
          target: "~/cuneim/"
          strip_components: 1

      - name: Copy admin prisma files to server
        if: env.BUILD_ADMIN == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "admin-platform/api/prisma/"
          target: "~/cuneim/"
          strip_components: 1

      - name: Copy nginx files to server
        if: env.BUILD_ADMIN == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "user-platform/nginx/"
          target: "~/cuneim/"
          strip_components: 1

      # Step 8: Deploy to server via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # Create deployment directory
            mkdir -p ~/cuneim
            mkdir -p ~/cuneim/agent/data ~/cuneim/shared-logs

            # Read old per-service image tags from existing .env (fallback to 'latest')
            OLD_APP_TAG=$(grep '^APP_IMAGE_TAG=' ~/cuneim/.env 2>/dev/null | cut -d= -f2 || echo "latest")
            OLD_AGENT_TAG=$(grep '^AGENT_IMAGE_TAG=' ~/cuneim/.env 2>/dev/null | cut -d= -f2 || echo "latest")
            OLD_ADMIN_TAG=$(grep '^ADMIN_IMAGE_TAG=' ~/cuneim/.env 2>/dev/null | cut -d= -f2 || echo "latest")
            [ -z "$OLD_APP_TAG" ] && OLD_APP_TAG="latest"
            [ -z "$OLD_AGENT_TAG" ] && OLD_AGENT_TAG="latest"
            [ -z "$OLD_ADMIN_TAG" ] && OLD_ADMIN_TAG="latest"

            # Write .env file with all secrets
            cat > ~/cuneim/.env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URL=${{ secrets.GOOGLE_REDIRECT_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            BASE_URL=${{ secrets.BASE_URL }}
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            GHCR_IMAGE=${{ env.IMAGE_NAME }}
            GHCR_IMAGE_AGENT=${{ env.AGENT_IMAGE_NAME }}
            GHCR_IMAGE_ADMIN=${{ env.ADMIN_IMAGE_NAME }}
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
            ADMIN_JWT_REFRESH_SECRET=${{ secrets.ADMIN_JWT_REFRESH_SECRET }}
            DEPLOY_ENV=${{ env.DEPLOY_ENV }}
            TOTP_ENCRYPTION_KEY=${{ secrets.TOTP_ENCRYPTION_KEY }}
            INTERNAL_BASE_URL=${{ secrets.INTERNAL_BASE_URL }}
            SWAGGER_PASSWORD=${{ secrets.SWAGGER_PASSWORD }}
            ENVEOF

            # Remove leading whitespace from .env lines
            sed -i 's/^[[:space:]]*//' ~/cuneim/.env

            # Append per-service image tags (new tag for built services, old tag for unbuilt)
            if [ "${{ env.BUILD_APP }}" = "true" ]; then echo "APP_IMAGE_TAG=${{ env.IMAGE_TAG }}" >> ~/cuneim/.env; else echo "APP_IMAGE_TAG=$OLD_APP_TAG" >> ~/cuneim/.env; fi
            if [ "${{ env.BUILD_AGENT }}" = "true" ]; then echo "AGENT_IMAGE_TAG=${{ env.IMAGE_TAG }}" >> ~/cuneim/.env; else echo "AGENT_IMAGE_TAG=$OLD_AGENT_TAG" >> ~/cuneim/.env; fi
            if [ "${{ env.BUILD_ADMIN }}" = "true" ]; then echo "ADMIN_IMAGE_TAG=${{ env.IMAGE_TAG }}" >> ~/cuneim/.env; else echo "ADMIN_IMAGE_TAG=$OLD_ADMIN_TAG" >> ~/cuneim/.env; fi

            cd ~/cuneim

            # Login to GHCR to pull private images
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            # Pull images for selected services
            PULL_SERVICES=""
            if [ "${{ env.BUILD_APP }}" = "true" ]; then PULL_SERVICES="$PULL_SERVICES app"; fi
            if [ "${{ env.BUILD_AGENT }}" = "true" ]; then PULL_SERVICES="$PULL_SERVICES agent"; fi
            if [ "${{ env.BUILD_ADMIN }}" = "true" ]; then PULL_SERVICES="$PULL_SERVICES admin"; fi
            if [ -n "$PULL_SERVICES" ]; then
              docker compose pull $PULL_SERVICES
            fi

            # Start/restart selected services only
            UP_SERVICES=""
            if [ "${{ env.BUILD_APP }}" = "true" ]; then UP_SERVICES="$UP_SERVICES app"; fi
            if [ "${{ env.BUILD_AGENT }}" = "true" ]; then UP_SERVICES="$UP_SERVICES agent"; fi
            if [ "${{ env.BUILD_ADMIN }}" = "true" ]; then UP_SERVICES="$UP_SERVICES admin"; fi
            if [ -n "$UP_SERVICES" ]; then
              docker compose up -d $UP_SERVICES
            fi

            # Run database migrations (conditional)
            if [ "${{ env.BUILD_APP }}" = "true" ]; then
              docker compose exec -T --user root app npx prisma migrate deploy || true
            fi

            # Run admin database migrations and seed (conditional)
            if [ "${{ env.BUILD_ADMIN }}" = "true" ]; then
              docker compose exec -T admin npx prisma migrate deploy || true
              if [ ! -f ~/cuneim/.seed_done ]; then
                docker compose exec -T admin node prisma/seed.js && touch ~/cuneim/.seed_done
              fi
            fi

            # Deploy admin nginx config (conditional)
            if [ "${{ env.BUILD_ADMIN }}" = "true" ]; then
              sudo cp ~/cuneim/nginx/admin.cuneim.com.conf /etc/nginx/conf.d/admin.cuneim.com.conf
              sudo nginx -t && sudo systemctl reload nginx
            fi
  notify:
    if: always()
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: 🔔 推送到 Lark
        env:
          STATUS: ${{ needs.build-and-deploy.result }}
          SERVICES: ${{ needs.build-and-deploy.outputs.services_display }}
          ACTOR: ${{ github.actor }}
          DEPLOY_TAG: ${{ needs.build-and-deploy.outputs.deploy_tag }}
          COMMIT_SHA: ${{ needs.build-and-deploy.outputs.commit_sha }}
          COMMIT_MESSAGE: ${{ needs.build-and-deploy.outputs.commit_message }}
          COMMIT_TIME: ${{ needs.build-and-deploy.outputs.commit_time }}
          REPOSITORY: ${{ secrets.REPOSITORY }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKER_URL: https://deploy-bot.ricex-mr.workers.dev
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: |
          STATUS_TEXT="success"
          if [ "$STATUS" != "success" ]; then
            STATUS_TEXT="failed"
          fi

          COMMIT_URL="https://github.com/${REPOSITORY}/commit/${COMMIT_SHA}"

          curl -s -X POST "${WORKER_URL}/notify" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NOTIFY_SECRET}" \
            -d "{
              \"status\": \"${STATUS_TEXT}\",
              \"actor\": \"${ACTOR}\",
              \"tag\": \"${DEPLOY_TAG}\",
              \"services\": \"${SERVICES}\",
              \"commit_message\": \"${COMMIT_MESSAGE}\",
              \"commit_time\": \"${COMMIT_TIME}\",
              \"commit_sha\": \"${COMMIT_SHA}\",
              \"repository\": \"${REPOSITORY}\",
              \"workflow_url\": \"${WORKFLOW_URL}\",
              \"commit_url\": \"${COMMIT_URL}\"
            }"
