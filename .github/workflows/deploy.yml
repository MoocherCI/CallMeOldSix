name: 'Deploy User Platform'

on:
  push:
    tags:
      - 'dev-v*'
      - 'test-v*'
      - 'prod-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: degen0331/user-platform

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Step 1: Checkout proxy repo (for scripts) and configure SSH
      - name: Checkout proxy repo
        uses: actions/checkout@v4

      - name: Configure git for private repo access
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/gitconfig.sh
        env:
          ED25519_KEY: ${{ secrets.ED25519_KEY }}

      # Step 2: Parse tag for environment and branch
      - name: Parse tag for environment and branch
        run: |
          TAG="${{ github.ref_name }}"

          # Extract environment prefix and set DEPLOY_ENV / DEPLOY_HOST
          if [[ "$TAG" == dev-v* ]]; then
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV
            REMAINDER="${TAG#dev-v}"
          elif [[ "$TAG" == test-v* ]]; then
            echo "DEPLOY_ENV=test" >> $GITHUB_ENV
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV
            REMAINDER="${TAG#test-v}"
          elif [[ "$TAG" == prod-v* ]]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV
            REMAINDER="${TAG#prod-v}"
          fi

          # REMAINDER is now e.g. "1.0.0" or "1.0.0-feature/login"
          # Extract optional branch: everything after the first "-" in REMAINDER
          if [[ "$REMAINDER" == *-* ]]; then
            REPO_BRANCH="${REMAINDER#*-}"
          else
            REPO_BRANCH=""
          fi
          echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV

      # Step 3: Checkout private repository
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.REPOSITORY }}
          ssh-key: ${{ secrets.ED25519_KEY }}
          ref: ${{ env.REPO_BRANCH }}

      # Step 4: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # Step 6: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./user-platform
          file: ./user-platform/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 7: Upload docker-compose.yml and prisma directory to server
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "user-platform/docker-compose.yml,user-platform/prisma/"
          target: "~/cuneim/"
          strip_components: 1

      # Step 8: Deploy to server via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # Create deployment directory
            mkdir -p ~/cuneim

            # Write .env file with all secrets
            cat > ~/cuneim/.env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URL=${{ secrets.GOOGLE_REDIRECT_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            BASE_URL=${{ secrets.BASE_URL }}
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            GHCR_IMAGE=degen0331/user-platform
            IMAGE_TAG=${{ github.ref_name }}
            DEPLOY_ENV=${{ env.DEPLOY_ENV }}
            TOTP_ENCRYPTION_KEY=${{ secrets.TOTP_ENCRYPTION_KEY }}
            ENVEOF

            # Remove leading whitespace from .env lines
            sed -i 's/^[[:space:]]*//' ~/cuneim/.env

            cd ~/cuneim

            # Login to GHCR to pull private images
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            # Pull latest app image
            docker compose pull app

            # Start/restart all services
            docker compose up -d

            # Run database migrations
            docker compose exec -T app npx prisma migrate deploy
