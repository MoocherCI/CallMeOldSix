name: 'Deploy User Platform'

on:
  push:
    tags:
      - 'dev-v*'
      - 'test-v*'
      - 'prod-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: degen0331/user-platform
  AGENT_IMAGE_NAME: moocherci/agent
  ADMIN_IMAGE_NAME: moocherci/admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Step 1: Checkout proxy repo (for scripts) and configure SSH
      - name: Checkout proxy repo
        uses: actions/checkout@v4

      - name: Configure git for private repo access
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/gitconfig.sh
        env:
          ED25519_KEY: ${{ secrets.ED25519_KEY }}

      # Step 2: Parse tag for environment and branch
      - name: Parse tag for environment and branch
        run: |
          TAG="${{ github.ref_name }}"
          # Extract environment prefix and set DEPLOY_ENV / DEPLOY_HOST
          if [[ "$TAG" == dev-v* ]]; then
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV
            REMAINDER="${TAG#dev-v}"
          elif [[ "$TAG" == test-v* ]]; then
            echo "DEPLOY_ENV=test" >> $GITHUB_ENV
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV
            REMAINDER="${TAG#test-v}"
          elif [[ "$TAG" == prod-v* ]]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}" >> $GITHUB_ENV
            REMAINDER="${TAG#prod-v}"
          fi
          # REMAINDER is now e.g. "1.0.0" or "1.0.0-feature/login"
          # Extract optional branch: everything after the first "-" in REMAINDER
          if [[ "$REMAINDER" == *-* ]]; then
            REPO_BRANCH="${REMAINDER#*-}"
          else
            REPO_BRANCH=""
          fi
          echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV

      # Step 3: Checkout private repository
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.REPOSITORY }}
          ssh-key: ${{ secrets.ED25519_KEY }}
          ref: ${{ env.REPO_BRANCH }}

      # Step 4: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # Step 5.5: Generate Prisma schemas from shared models
      - name: Generate Prisma schemas
        run: |
          chmod +x prisma-shared/build-schema.sh
          bash prisma-shared/build-schema.sh user-platform/prisma/base.prisma user-platform/prisma/schema.prisma
          bash prisma-shared/build-schema.sh admin-platform/api/prisma/base.prisma admin-platform/api/prisma/schema.prisma

      # Step 6: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./user-platform
          file: ./user-platform/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6.5: Build and push Agent Docker image
      - name: Build and push Agent Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6.6: Build and push Admin Docker image
      - name: Build and push Admin Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-platform
          file: ./admin-platform/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 7: Upload docker-compose.yml and prisma directory to server
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "user-platform/docker-compose.yml,user-platform/prisma/,admin-platform/api/prisma/,user-platform/nginx/"
          target: "~/cuneim/"
          strip_components: 1

      # Step 8: Deploy to server via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # Create deployment directory
            mkdir -p ~/cuneim
            mkdir -p ~/cuneim/agent/data ~/cuneim/shared-logs

            # Write .env file with all secrets
            cat > ~/cuneim/.env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URL=${{ secrets.GOOGLE_REDIRECT_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            BASE_URL=${{ secrets.BASE_URL }}
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            GHCR_IMAGE=${{ github.repository_owner }}/user-platform
            GHCR_IMAGE_AGENT=${{ github.repository_owner }}/agent
            GHCR_IMAGE_ADMIN=${{ github.repository_owner }}/admin
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
            ADMIN_JWT_REFRESH_SECRET=${{ secrets.ADMIN_JWT_REFRESH_SECRET }}
            IMAGE_TAG=${{ github.ref_name }}
            DEPLOY_ENV=${{ env.DEPLOY_ENV }}
            TOTP_ENCRYPTION_KEY=${{ secrets.TOTP_ENCRYPTION_KEY }}
            INTERNAL_BASE_URL=${{ secrets.INTERNAL_BASE_URL }}
            SWAGGER_PASSWORD=${{ secrets.SWAGGER_PASSWORD }}
            ENVEOF

            # Remove leading whitespace from .env lines
            sed -i 's/^[[:space:]]*//' ~/cuneim/.env

            cd ~/cuneim

            # Login to GHCR to pull private images
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            # Pull latest app image
            docker compose pull app agent admin

            # Start/restart all services
            docker compose up -d

            # Run database migrations
            docker compose exec -T app npx prisma migrate deploy

            # Run admin database migrations and seed
            docker compose exec -T admin npx prisma migrate deploy
            docker compose exec -T admin npx prisma db seed

            # Deploy admin nginx config
            sudo cp ~/cuneim/nginx/admin.cuneim.com.conf /etc/nginx/sites-available/admin.cuneim.com.conf
            sudo ln -sf /etc/nginx/sites-available/admin.cuneim.com.conf /etc/nginx/sites-enabled/admin.cuneim.com.conf
            sudo nginx -t && sudo systemctl reload nginx
  notify:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4
      - name: 🔔 推送到 Lark
        env:
          STATUS: ${{ needs.deploy.outputs.status }}
          ACTOR: ${{ github.actor }}
          TAG: ${{ github.ref }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: |
          STATUS_TEXT="✅ Success"
          if [ "$STATUS" != "success" ]; then
            STATUS_TEXT="❌ Failed"
          fi

          TAG_NAME=$(echo "$TAG" | sed 's|refs/tags/||')

          COMMIT_MESSAGE=$(git log -1 --pretty=format:"%s")
          COMMIT_TIME=$(git log -1 --pretty=format:"%cI")

          JSON_PAYLOAD=$(cat <<EOF
              {
                "msg_type": "interactive",
                "card": {
                  "header": {
                    "title": {
                      "tag": "plain_text",
                      "content": "GitHub Action 执行通知"
                    }
                  },
                  "elements": [
                    {
                      "tag": "div",
                      "text": {
                        "tag": "lark_md",
                        "content": "**发起人**: ${ACTOR}\n**Tag**: ${TAG_NAME}\n**状态**: ${STATUS_TEXT}\n**提交信息**: ${COMMIT_MESSAGE}\n**提交时间**: ${COMMIT_TIME}\n[查看提交](${COMMIT_URL})"
                      }
                    },
                    {
                      "tag": "action",
                      "actions": [
                        {
                          "tag": "button",
                          "text": {
                            "tag": "lark_md",
                            "content": "查看 Workflow"
                          },
                          "url": "${WORKFLOW_URL}",
                          "type": "default"
                        }
                      ]
                    }
                  ]
                }
              }
          EOF
          )

          curl -X POST "$LARK_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$JSON_PAYLOAD"
